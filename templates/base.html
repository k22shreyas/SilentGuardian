<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SilentGuardian</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Georgia, serif; background: #F7F5F0; }
    .sans { font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen">
  <!-- Disclaimer banner — always visible -->
  <div class="bg-stone-800 text-stone-300 text-xs text-center py-2 px-4">
    <strong class="text-white">Not a medical tool.</strong>
    SilentGuardian tracks language patterns only and does not diagnose any condition.
  </div>

  <div class="max-w-lg mx-auto px-4 py-6 pb-24">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
